{% extends "base.html" %}

{% block content %}

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-blue-500">
            ADD QUESTION
        </h1>
    </div>

    <div class="max-w-2xl mx-auto bg-slate-900/80 border border-slate-700 rounded-xl overflow-hidden shadow-2xl">
        <div class="bg-slate-800/50 px-6 py-4 border-b border-slate-700 flex justify-between items-center">
            <h2 class="text-slate-200 font-bold tracking-wider uppercase text-sm">NEW QUESTION</h2>
        </div>

        <form action="/add_question" method="post" class="p-6 space-y-6">
            
            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-2">Question Title</label>
                <textarea name="title" rows="2" placeholder="e.g. Kolik je 2 + 2?" required
                          class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 font-mono text-base placeholder-slate-600 transition-colors"></textarea>
            </div>

            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-2">Categories (comma separated)</label>
                <input type="text" name="categories" placeholder="e.g. matematika, vtipy"
                       class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 font-mono text-base placeholder-slate-600 transition-colors">
            </div>

            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-4">Options (Max 6)</label>
                
                <div class="space-y-3">
                    {% for i in range(6) %}
                    <div class="flex items-center gap-3">
                        <div class="flex items-center justify-center">
                            <input type="radio" name="correct_index" value="{{ i }}" {% if i == 0 %}checked{% endif %}
                                   class="w-5 h-5 text-blue-600 bg-slate-950 border-slate-600 focus:ring-blue-500 focus:ring-2 cursor-pointer">
                        </div>
                            <textarea name="option_{{ i }}" placeholder="Option {{ i + 1 }}" rows="2"
                                    class="w-full h-[150px] md:h-[70px] bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-green-500 font-mono text-base placeholder-slate-700 transition-colors resize-y"></textarea>
                    </div>
                    {% endfor %}
                </div>
                <p class="text-[10px] text-slate-500 mt-2 italic">Fill at least 2 options. Leave others empty.</p>
            </div>

            <div class="pt-4 border-t border-slate-700/50">
                <button type="submit" class="w-full py-4 rounded-lg bg-gradient-to-r from-blue-700 to-indigo-600 hover:from-blue-600 hover:to-indigo-500 text-white font-bold tracking-widest shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-2">
                    SAVE QUESTION
                </button>
            </div>

        </form>
    </div>

{% endblock %}
