{% extends "base.html" %}

{% block content %}

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-200 to-green-500">
            ADD PRESENT
        </h1>
    </div>

    <div class="max-w-2xl mx-auto bg-slate-900/80 border border-slate-700 rounded-xl overflow-hidden shadow-2xl">
        <div class="bg-slate-800/50 px-6 py-4 border-b border-slate-700">
            <h2 class="text-slate-200 font-bold tracking-wider uppercase text-sm">NEW</h2>
        </div>

        <form action="/add_present" method="post" class="p-6 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs uppercase font-bold text-slate-500 mb-2">Recipient</label>
                    <input type="text" name="recipients" placeholder="např. Máma, Táta"
                           class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-green-500 font-mono text-base placeholder-slate-600 transition-colors">
                </div>
                <div>
                    <label class="block text-xs uppercase font-bold text-slate-500 mb-2">Sender</label>
                    <input type="text" name="senders" placeholder="např. Ježíšek"
                           class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-green-500 font-mono text-base placeholder-slate-600 transition-colors">
                </div>
            </div>

            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-2">Public note (visible after unlocking)</label>
                <textarea name="note" rows="3" placeholder="Merry Christmas..."
                          class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-green-500 font-mono text-base placeholder-slate-600 transition-colors"></textarea>
            </div>

            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-2">Hidden note (admin only)</label>
                <textarea name="hidden_note" rows="2" placeholder="Here is the hidden PS5..."
                          class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500 font-mono text-base placeholder-slate-600 transition-colors"></textarea>
            </div>

            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-2">Question categories (comma separated)</label>
                <input type="text" name="question_categories" placeholder="e.g. history, family, jokes"
                       class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 font-mono text-base placeholder-slate-600 transition-colors">
                <p class="text-[10px] text-slate-500 mt-1 italic">Leave empty for random selection from all.</p>
            </div>

            <div class="pt-4 border-t border-slate-700/50">
                <button type="submit" class="w-full py-4 rounded-lg bg-gradient-to-r from-green-700 to-emerald-600 hover:from-green-600 hover:to-emerald-500 text-white font-bold tracking-widest shadow-lg shadow-green-900/20 transition-all flex items-center justify-center gap-2">
                    SAVE
                </button>
            </div>

        </form>
    </div>

{% endblock %}
