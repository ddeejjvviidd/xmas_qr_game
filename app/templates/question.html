{% extends "base.html" %}

{% block content %}

    <p class="text-center text-sm text-slate-400 mb-4 uppercase tracking-widest">Otázka</p>
    
    <h2 class="text-2xl font-bold text-center text-yellow-400 mb-8 leading-relaxed">
        {{ question.title }}
    </h2>

    <div class="space-y-3" id="options-container">
        {% if question.options %}
            {% for opt in question.options %}
                <button onclick="submitAnswer({{ loop.index0 }})" 
                        class="w-full py-4 px-6 bg-slate-700 hover:bg-yellow-500 hover:text-slate-900 rounded-xl transition-all duration-200 font-medium text-lg shadow-lg border border-slate-600 hover:border-yellow-400 hover:shadow-yellow-500/20 active:scale-95">
                    {{ opt }}
                </button>
            {% endfor %}
        {% else %}
             <p class="text-red-500 text-center">Tento typ otázky zatím není podporován.</p>
        {% endif %}
    </div>

    <div id="feedback-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 hidden flex items-center justify-center transition-opacity duration-300 opacity-0">
        <div class="text-center transform transition-transform duration-300 scale-90" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-4"></div>
            <h3 id="feedback-title" class="text-3xl font-bold mb-2"></h3>
            <p id="feedback-message" class="text-slate-300"></p>
        </div>
    </div>

    <script>
        async function submitAnswer(selectedIndex) {
            const darekId = "{{ present_id }}";
            const questionId = {{ question.id }};
            
            const buttons = document.querySelectorAll('#options-container button');
            buttons.forEach(btn => btn.disabled = true);
            buttons[selectedIndex].classList.add('bg-slate-500', 'cursor-wait');

            try {
                const response = await fetch('/verify_answer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        present_id: darekId,
                        question_id: questionId,
                        selected_option_index: selectedIndex
                    })
                });
                
                const data = await response.json();
                showFeedback(data.success, data.message);

            } catch (error) {
                console.error('Error:', error);
                alert("Něco se pokazilo při komunikaci se serverem.");
            }
        }

        function showFeedback(isSuccess, message) {
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const msg = document.getElementById('feedback-message');
            const content = document.getElementById('feedback-content');

            // Nastavení obsahu
            if (isSuccess) {
                icon.innerHTML = "✅";
                title.innerHTML = "Správně!";
                title.className = "text-3xl font-bold mb-2 text-green-500";
            } else {
                icon.innerHTML = "❌";
                title.innerHTML = "Špatně!";
                title.className = "text-3xl font-bold mb-2 text-red-500";
            }
            msg.innerText = message;

            // Zobrazení overlaye
            overlay.classList.remove('hidden');
            // Malé zpoždění pro animaci opacity
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                content.classList.remove('scale-90');
                content.classList.add('scale-100');
            }, 10);

            // Co se stane dál?
            setTimeout(() => {
                if (isSuccess) {
                    // Úspěch -> reload stránky (server pak vrátí result.html, protože status je unlocked)
                    window.location.reload();
                } else {
                    // Neúspěch -> reload stránky (server vybere novou otázku)
                    window.location.reload();
                }
            }, 2000); // Čekáme 2 sekundy, aby si uživatel přečetl výsledek
        }
    </script>

{% endblock %}
